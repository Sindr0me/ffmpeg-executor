version: "3.9"

networks:
  app_net:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: "172.20.0.0/16"
        - subnet: "fd12:3456:789a::/64"

services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    env_file: .env
    networks:
      - app_net
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker --concurrency=2 --loglevel=info --time-limit=300 --soft-time-limit=240
    env_file: .env
    networks:
      - app_net
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /tmp/ffmpeg-work:/work
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    networks:
      - app_net
    volumes:
      - ./data/redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel run
    networks:
      - app_net
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - api
    restart: unless-stopped
